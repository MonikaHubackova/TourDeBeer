  </div>

  <script src="main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const images = Array.from(document.querySelectorAll(".galerie-grid img"));
      let currentIndex = 0;

      // Funkce pro aktualizaci obrázku v lightboxu
      const updateLightbox = (index) => {
        currentIndex = index;
        lightboxImg.src = images[currentIndex].src;
      };

      // Otevření lightboxu
      images.forEach((img, index) => {
        img.addEventListener("click", () => {
          updateLightbox(index);
          lightbox.classList.add("open");
          document.body.style.overflow = "hidden";
        });
      });

      // Funkce pro přepnutí na další/předchozí
      const nextImage = () => {
        let nextIdx = (currentIndex + 1) % images.length;
        updateLightbox(nextIdx);
      };

      const prevImage = () => {
        let prevIdx = (currentIndex - 1 + images.length) % images.length;
        updateLightbox(prevIdx);
      };

      // Ovládání klávesnicí
      document.addEventListener("keydown", (e) => {
        if (!lightbox.classList.contains("open")) return;

        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") {
          lightbox.classList.remove("open");
          document.body.style.overflow = "auto";
        }
      });

      // Zavření kliknutím (mimo obrázek)
      lightbox.addEventListener("click", (e) => {
        // Pokud klikneš na pozadí (ne na samotný obrázek), zavře se to
        if (e.target !== lightboxImg) {
          lightbox.classList.remove("open");
          document.body.style.overflow = "auto";
        }
      });
    });
  </script>
