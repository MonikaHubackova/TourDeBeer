<header>
  <div class="container menu-rozlozeni">
    <div class="logo">
      <a href="index.html">
        <img src="logo-tdb.svg" alt="TDB Logo" height="50px" />
      </a>
    </div>
    <nav id="nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="info.html">Tour Info</a></li>
        <li><a href="sponzori.html">Sponzoři</a></li>
        <li><a href="galerie.html">Galerie</a></li>
        <li><a href="mapa.html">Mapa</a></li>
      </ul>
    </nav>
    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
  <script>
  // Funkce, která vše zařídí v jednom kroku
  async function inicializujWeb() {
    try {
      // 1. STÁHNOUT HLAVIČKU
      const response = await fetch("header.html");
      const htmlText = await response.text();
      document.getElementById("header-placeholder").innerHTML = htmlText;

      // 2. AKTIVOVAT HAMBURGER (až teď existuje v HTML!)
      const hamburger = document.getElementById("hamburger");
      const nav = document.getElementById("nav");

      // Přidáme kontrolu, jestli tam ty prvky opravdu jsou
      if (hamburger && nav) {
        hamburger.addEventListener("click", () => {
          nav.classList.toggle("open");
        });
      }

      // 3. (VOLITELNÉ) STÁHNOUT PATIČKU
      const footerRes = await fetch("footer.html");
      const footerText = await footerRes.text();
      document.getElementById("footer-placeholder").innerHTML = footerText;

    } catch (error) {
      console.error("Chyba při načítání layoutu:", error);
    }
  }

  // Spustit hned po načtení stránky
  window.addEventListener('DOMContentLoaded', inicializujWeb);
</script>
</header>
