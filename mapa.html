<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/x-icon" href="logo-tdb.svg" />
  <title>TourDeBeer | Mapa</title>
</head>
<body>
  <div id="header-placeholder"></div>

  <section class="container mapa">
    <h1 class="nadpis">Mapa</h1>
    <iframe src="https://mapy.com/s/dasodumatu" loading="lazy"></iframe>
  </section>

  <div id="footer-placeholder"></div>

  <script>
    async function inicializujWeb() {
      try {
        const response = await fetch("header.html");
        const htmlText = await response.text();
        document.getElementById("header-placeholder").innerHTML = htmlText;

        const hamburger = document.getElementById("hamburger");
        const nav = document.getElementById("nav");

        if (hamburger && nav) {
          hamburger.addEventListener("click", () => {
            nav.classList.toggle("open");
          });
        }

        const footerRes = await fetch("footer.html");
        const footerText = await footerRes.text();
        document.getElementById("footer-placeholder").innerHTML = footerText;
      } catch (error) {
        console.error("Chyba při načítání:", error);
      }
    }

    window.addEventListener("DOMContentLoaded", inicializujWeb);
  </script>
</body>
