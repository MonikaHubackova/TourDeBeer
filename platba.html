<head>
  <meta charset="UTF-8" />
  <meta name="viewporleapit" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googs.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/x-icon" href="logo-tdb.svg" />

  <title>TourDeBeer | Platba</title>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="hlavni-obsah">
    <div class="container text-center">
      <h1>Děkujeme za registraci!</h1>

      <p class="platba-text">
        Startovné <strong>180 Kč</strong> pošlete na účet:
      </p>
      <p class="cislo-uctu">705745053/0800</p>

      <p class="qr-info">Nebo využijte QR kód:</p>
      <div class="qr-kod">
        <img src="QR.png" alt="QR kód pro platbu" style="max-width: 200px" />
      </div>

      <div class="diky-flex-kontejner">
        <div class="diky-ilustrace">
          <img src="cyklista.svg" alt="TDB Ilustrace Cyklisty" />
        </div>
        <div class="diky-text-vedle">
          <p class="tesime-se">Těšíme se na vás!</p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    async function inicializujWeb() {
      try {
        const response = await fetch("header.html");
        const htmlText = await response.text();
        document.getElementById("header-placeholder").innerHTML = htmlText;

        const hamburger = document.getElementById("hamburger");
        const nav = document.getElementById("nav");

        if (hamburger && nav) {
          hamburger.addEventListener("click", () => {
            nav.classList.toggle("open");
          });
        }

        const footerRes = await fetch("footer.html");
        const footerText = await footerRes.text();
        document.getElementById("footer-placeholder").innerHTML = footerText;
      } catch (error) {
        console.error("Chyba při načítání:", error);
      }
    }

    window.addEventListener("DOMContentLoaded", inicializujWeb);
  </script>
</body>
