<head>
  <meta charset="UTF-8" />
  <meta name="viewporleapit" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googs.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/x-icon" href="logo-tdb.svg" />

  <title>TourDeBeer | Platba</title>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="hlavni-obsah">
    <div class="container text-center">
      <h1>Děkujeme za registraci!</h1>

      <p class="platba-text">
        Celkem za <strong id="display-count">1</strong> os. pošlete
        <strong id="display-total">180</strong> Kč.
      </p>
      <p class="platba-instrukce">
        Platbu pošlete na uvedené číslo účtu nebo využijte QR kód:
      </p>

      <div class="platebni-karta">
        <div class="cislo-uctu-velke">705745053/0800</div>
        <div class="qr-kod-kontejner">
          <img id="qr-image" src="" alt="QR Platba" />
        </div>
      </div>

      <div class="diky-flex-kontejner">
        <div class="diky-ilustrace">
          <img src="cyklista.svg" alt="TDB Ilustrace Cyklisty" />
        </div>
        <div class="diky-text-vedle">
          <p class="tesime-se">Těšíme se na vás!</p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    async function inicializujWeb() {
      try {
        const response = await fetch("header.html");
        const htmlText = await response.text();
        document.getElementById("header-placeholder").innerHTML = htmlText;

        const hamburger = document.getElementById("hamburger");
        const nav = document.getElementById("nav");

        if (hamburger && nav) {
          hamburger.addEventListener("click", () => {
            nav.classList.toggle("open");
          });
        }

        const footerRes = await fetch("footer.html");
        const footerText = await footerRes.text();
        document.getElementById("footer-placeholder").innerHTML = footerText;
      } catch (error) {
        console.error("Chyba při načítání:", error);
      }
    }

    window.addEventListener("DOMContentLoaded", inicializujWeb);
  </script>

  <script>
    function generovatPlatbu() {
      // 1. Získání počtu lidí z URL adresy (?count=X)
      const urlParams = new URLSearchParams(window.location.search);
      const count = parseInt(urlParams.get("count")) || 1;
      const cenaZaOsobu = 180;
      const celkovaCena = count * cenaZaOsobu;

      // 2. Aktualizace textu na stránce
      document.getElementById("display-count").innerText = count;
      document.getElementById("display-total").innerText = celkovaCena;

      // 3. Vygenerování QR kódu přes Paylibo API
      // Parametry: účet, kód banky, částka, měna, zpráva pro příjemce
      const acc = "705745053";
      const bank = "0800";
      const msg = "TourDeBeer_2026";

      const qrUrl = `https://api.paylibo.com/paylibo/generator/czech/image?accountNumber=${acc}&bankCode=${bank}&amount=${celkovaCena}&currency=CZK&message=${msg}`;

      document.getElementById("qr-image").src = qrUrl;
    }

    window.addEventListener("DOMContentLoaded", () => {
      inicializujWeb(); // Vaše původní funkce na header/footer
      generovatPlatbu();
    });
  </script>
</body>
