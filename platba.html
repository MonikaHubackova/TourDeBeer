<head>
  <meta charset="UTF-8" />
  <meta name="viewporleapit" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googs.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/x-icon" href="logo-tdb.svg" />

  <title>TourDeBeer | Platba</title>
</head>
<body>
  <header>
    <div class="container menu-rozlozeni">
      <div class="logo">
        <a href="index.html">
          <img src="logo-tdb.svg" alt="TDB Logo" height="50px" />
        </a>
      </div>

      <nav id="nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="info.html">Tour Info</a></li>
          <li><a href="sponzori.html">Sponzoři</a></li>
          <li><a href="galerie.html">Galerie</a></li>
          <li><a href="mapa.html">Mapa</a></li>
        </ul>
      </nav>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <main class="hlavni-obsah">
    <div class="container text-center">
      <h1>Děkujeme za registraci!</h1>

      <p class="platba-text">
        Startovné <strong>180 Kč</strong> pošlete na účet:
      </p>
      <p class="cislo-uctu">705745053/0800</p>

      <p class="qr-info">Nebo využijte QR kód:</p>
      <div class="qr-kod">
        <img src="QR.png" alt="QR kód pro platbu" style="max-width: 200px" />
      </div>

      <div class="diky-flex-kontejner">
        <div class="diky-ilustrace">
          <img src="cyklista.svg" alt="TDB Ilustrace Cyklisty" />
        </div>
        <div class="diky-text-vedle">
          <p class="tesime-se">Těšíme se na vás!</p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container footer-obsah">
      <div class="footer-text">
        <p>© TDB 2002 – 2026<br />Tour de Beer Team</p>
        <p>
          Web: Monika Hubáčková<br /><a
            href="https://www.monikavisuals.eu"
            target="_blank"
            >www.monikavisuals.eu</a
          >
        </p>
      </div>
      <a></a>
      <div class="footer-logo">
        <a href="#top">
          <img src="logo-tdb.svg" alt="TDB Logo" />
        </a>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const hamburger = document.getElementById("hamburger");
      const nav = document.querySelector("nav");

      hamburger.addEventListener("click", () => {
        nav.classList.toggle("open");
      });
    });
  </script>
</body>
