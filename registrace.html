<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/x-icon" href="logo-tdb.svg" />

  <title>TourDeBeer | Registrace</title>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="hlavni-obsah">
    <div class="container">
      <h1 class="registrace-nadpis">Registrace</h1>

      <!-- action="https://formsubmit.co/richard.kobylik@volny.cz" -->

      <form
        action="https://formsubmit.co/hubackovamonika0@gmail.com"
        method="POST"
        class="registracni-form"
        id="registraceForm"
      >
        <input type="hidden" name="_color" value="f39c12" />
        <input type="hidden" name="_language" value="cs" />
        <input
          type="hidden"
          name="_subject"
          value="Nová registrace: Tour De Beer 2026"
        />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />

        <div class="form-grid">
          <div class="form-group">
            <label>Jméno<span>*</span></label>
            <input type="text" name="Jméno" required />
          </div>
          <div class="form-group">
            <label>Příjmení<span>*</span></label>
            <input type="text" name="Příjmení" required />
          </div>
          <div class="form-group">
            <label>Telefon<span>*</span></label>
            <input type="tel" name="Telefon" required />
          </div>
          <div class="form-group">
            <label>E-mail<span>*</span></label>
            <input type="email" name="E-mail" required />
          </div>
          <div id="additional-participants-container"></div>

          <div class="form-group" style="margin-bottom: 30px">
            <button
              type="button"
              id="add-person-btn"
              class="btn"
              style="background: #27ae60; padding: 10px 20px; font-size: 16px"
            >
              + Přidat další osobu
            </button>
          </div>
        </div>

        <div class="form-group full-width">
          <label>Poznámka</label>

          <textarea name="Poznámka"></textarea>
        </div>

        <div class="form-checkbox">
          <input
            type="checkbox"
            id="souhlas"
            name="Souhlas se startovným"
            value="ANO"
            required
          />
          <label for="souhlas"
            >Po uhrazení startovného budete zaregistrováni. (180 Kč /
            osoba)</label
          >
        </div>

        <div class="form-submit">
          <button type="submit" class="btn">Odeslat</button>
        </div>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="main.js"></script>

  <script>
    let participantCount = 1;

    // Funkce pro přidání polí pro další osobu
    document.getElementById("add-person-btn").addEventListener("click", () => {
      participantCount++;
      const container = document.getElementById(
        "additional-participants-container",
      );
      const personDiv = document.createElement("div");
      personDiv.className = "form-grid";
      personDiv.style.marginBottom = "15px";
      personDiv.style.padding = "15px";
      personDiv.style.border = "1px dashed #f39c12";
      personDiv.style.borderRadius = "6px";

      personDiv.innerHTML = `
      <div style="grid-column: span 2; display: flex; justify-content: space-between; align-items: center;">
        <h4 style="margin: 0;">Další účastník (${participantCount}.)</h4>
        <button type="button" class="remove-btn" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">Odstranit</button>
      </div>
      <div class="form-group">
        <label>Jméno</label>
        <input type="text" name="Jméno_${participantCount}" required />
      </div>
      <div class="form-group">
        <label>Příjmení</label>
        <input type="text" name="Příjmení_${participantCount}" required />
      </div>
    `;

      container.appendChild(personDiv);

      // Mazání polí
      personDiv.querySelector(".remove-btn").addEventListener("click", () => {
        personDiv.remove();
        participantCount--;
      });
    });

    const form = document.getElementById("registraceForm");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = new FormData(form);
      // Přidáme celkový počet do odesílaných dat pro FormSubmit
      data.append("Celkový počet osob", participantCount);

      const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { Accept: "application/json" },
      });

      if (response.ok) {
        // Předáme počet lidí do URL adresy pro stránku platba.html
        window.location.href = `platba.html?count=${participantCount}`;
      } else {
        alert("Odeslání se nepodařilo. Zkuste to prosím znovu.");
      }
    });
  </script>
</body>
