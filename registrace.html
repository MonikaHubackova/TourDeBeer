<head>
  <meta charset="UTF-8" />
  <meta name="viewporleapit" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googs.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/x-icon" href="logo-tdb.svg" />

  <title>TourDeBeer | Registrace</title>
</head>
<body>
  <header>
    <div class="container menu-rozlozeni">
      <div class="logo">
        <a href="index.html">
          <img src="logo-tdb.svg" alt="TDB Logo" height="50px" />
        </a>
      </div>

      <nav id="nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="info.html">Tour Info</a></li>
          <li><a href="sponzori.html">Sponzoři</a></li>
          <li><a href="galerie.html">Galerie</a></li>
          <li><a href="mapa.html">Mapa</a></li>
        </ul>
      </nav>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <main class="hlavni-obsah">
    <div class="container">
      <h1 class="registrace-nadpis">Registrace</h1>

      <form
        action="https://formspree.io/f/mzdjzoeg"
        method="POST"
        class="registracni-form"
      >
        <input
          type="hidden"
          name="_subject"
          value="Nová registrace: Tour De Beer 2026"
        />
        <div class="form-grid">
          <div class="form-group">
            <label>Jméno<span>*</span></label>
            <input type="text" name="Jméno:" required />
          </div>
          <div class="form-group">
            <label>Příjmení<span>*</span></label>
            <input type="text" name="Příjmení:" required />
          </div>
          <div class="form-group">
            <label>Telefon<span>*</span></label>
            <input type="tel" name="Telefon:" required />
          </div>
          <div class="form-group">
            <label>E-mail<span>*</span></label>
            <input type="email" name="E-mail:" required />
          </div>
        </div>

        <div class="form-group full-width">
          <label>Poznámka</label>
          <span class="label-info"
            >(Pokud registrujete více lidí, tak jejich jména uveďte do
            poznámky)</span
          >
          <textarea name="Poznámka:"></textarea>
        </div>

        <div class="form-checkbox">
          <input type="checkbox" id="Souhlas" name="souhlas" required />
          <label for="souhlas"
            >Po uhrazení startovného budete zaregistrováni. (180 Kč /
            osoba)</label
          >
        </div>

        <div class="form-submit">
          <button type="submit" class="btn odeslat-btn">Odeslat</button>
        </div>
        <input
          type="hidden"
          name="_next"
          value="https://tour-de-beer.vercel.app/platba.html"
        />
      </form>
    </div>
  </main>

  <footer>
    <div class="container footer-obsah">
      <div class="footer-text">
        <p>© TDB 2002 – 2026<br />Tour de Beer Team</p>
        <p>
          Web: Monika Hubáčková<br /><a
            href="https://www.monikavisuals.eu"
            target="_blank"
            >www.monikavisuals.eu</a
          >
        </p>
      </div>
      <a></a>
      <div class="footer-logo">
        <a href="#top">
          <img src="logo-tdb.svg" alt="TDB Logo" />
        </a>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const hamburger = document.getElementById("hamburger");
      const nav = document.querySelector("nav");

      hamburger.addEventListener("click", () => {
        nav.classList.toggle("open");
      });
    });
  </script>
</body>
