<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googs.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/x-icon" href="logo-tdb.svg" />

  <title>TourDeBeer | Registrace</title>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="hlavni-obsah">
    <div class="container">
      <h1 class="registrace-nadpis">Registrace</h1>

      <form
        action="https://formsubmit.co/hubackovamonika@gmail.com"
        method="POST"
        class="registracni-form"
        id="registraceForm"
      >
        <input
          type="hidden"
          name="_subject"
          value="Nová registrace: Tour De Beer 2026"
        />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />
        <div class="form-grid">
          <div class="form-group">
            <label>Jméno<span>*</span></label>
            <input type="text" name="Jmeno" required />
          </div>
          <div class="form-group">
            <label>Příjmení<span>*</span></label>
            <input type="text" name="Prijmeni" required />
          </div>
          <div class="form-group">
            <label>Telefon<span>*</span></label>
            <input type="tel" name="Telefon" required />
          </div>
          <div class="form-group">
            <label>E-mail<span>*</span></label>
            <input type="email" name="Email" required />
          </div>
        </div>

        <div class="form-group full-width">
          <label>Poznámka</label>
          <span class="label-info"
            >(Pokud registrujete více lidí, tak jejich jména uveďte do
            poznámky)</span
          >
          <textarea name="Poznamka"></textarea>
        </div>

        <div class="form-checkbox">
          <input
            type="checkbox"
            id="souhlas"
            name="Souhlas_se_startovnym"
            required
          />
          <label for="souhlas"
            >Po uhrazení startovného budete zaregistrováni. (180 Kč /
            osoba)</label
          >
        </div>

        <div class="form-submit">
          <button type="submit" class="btn odeslat-btn">Odeslat</button>
        </div>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    async function inicializujWeb() {
      try {
        const response = await fetch("header.html");
        const htmlText = await response.text();
        document.getElementById("header-placeholder").innerHTML = htmlText;

        const hamburger = document.getElementById("hamburger");
        const nav = document.getElementById("nav");

        if (hamburger && nav) {
          hamburger.addEventListener("click", () => {
            nav.classList.toggle("open");
          });
        }

        const footerRes = await fetch("footer.html");
        const footerText = await footerRes.text();
        document.getElementById("footer-placeholder").innerHTML = footerText;
      } catch (error) {
        console.error("Chyba při načítání:", error);
      }
    }

    window.addEventListener("DOMContentLoaded", inicializujWeb);
  </script>

  <script>
    const form = document.getElementById("registraceForm");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = new FormData(form);

      const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: {
          Accept: "application/json",
        },
      });

      if (response.ok) {
        window.location.href = "platba.html";
      } else {
        alert("Odeslání se nepodařilo. Zkuste to prosím znovu.");
      }
    });
  </script>
</body>
